<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Detalle Plato')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="card-title mb-3" th:text="${'Plato ' + dish.id}">Plato</h1>

            <dl class="row mb-0">
                <dt class="col-sm-3"><i class="fa-solid fa-tag me-1"></i> Nombre</dt>
                <dd class="col-sm-9" th:text="${dish.name}"></dd>
            </dl>
        </div>

        <div class="card-footer bg-transparent" th:if="${dish.restaurant != null}">
            <i class="fa-solid fa-store text-primary me-1"></i>
            Pertenece al restaurante
            <a class="fw-semibold"
               th:href="@{/restaurants/{id}(id=${dish.restaurant.id})}"
               th:text="${dish.restaurant.name != null ? dish.restaurant.name : 'Ver restaurante'}">Ver restaurante</a>
        </div>
    </div>

    <!-- TODO Añadir lista de opiniones -->
    <!-- TODO Añadir lista de alérgenos -->
    <!-- TODO Añadir botón de Pedir plato que lo añada al pedido -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3" th:unless="${reviews.isEmpty()}">
        <div class="col" th:each="review : ${reviews}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${review.title}"></h5>
                    <p class="card-text" th:text="${review.content}"></p>
                    <span class="badge bg-success">
                        <i class="fa-solid fa-star"></i>
                        <span th:text="${review.rating + ' /5'}"></span>
                    </span>

                </div>
                <div class="card-footer">
                    <i class="fa-solid fa-calendar"></i>
                    <span th:text="${review.creationDate}"></span>
                </div>

            </div>

        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
