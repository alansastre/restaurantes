
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Formulario review')}">
</head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <h1>Formulario review</h1>
    <form th:action="@{/reviews}" method="post" th:object="${review}">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{restaurant}">
        <input type="hidden" th:field="*{dish}">
        <div class="mb-3">
            <label for="title" class="form-label">Título</label>
            <input id="title" type="text" class="form-control"
                   th:field="*{title}" required maxlength="255">
        </div>
        <div class="mb-3">
            <label for="content" class="form-label">Cuerpo del mensaje</label>
            <textarea id="content" class="form-control" rows="4"
                      th:field="*{content}" required maxlength="1000"></textarea>
        </div>
        <div class="mb-3">
            <label for="rating" class="form-label">Puntuación (de 1 a 5)</label>
            <input type="number" id="rating" class="form-control"
                   th:field="*{rating}" min="1" max="5" required>
        </div>
        <button type="submit" class="btn btn-success">
            <i class="fa-solid fa-floppy-disk"></i>Enviar
        </button>
    </form>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
